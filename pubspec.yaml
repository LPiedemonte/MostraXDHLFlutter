name: aulaflutter_xdhl
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - IMG/
  fonts:
   - family: HennyPenny
     fonts:
      - asset: fontes/HennyPenny-Regular.ttf
   - family: Kablammo
     fonts:
      - asset: fontes/Kablammo-Regular-VariableFont_MORF.ttf
   - family: FontdinerSwanky
     fonts:
      - asset: fontes/FontdinerSwanky-Regular.ttf
   - family: MozillaText
     fonts:
      - asset: fontes/MozillaText-VariableFont_wght.ttf